<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дуля за творчество - Музыкальное сообщество</title>
    <style>
        /* ... все стили из предыдущей версии ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            max-width: 1200px;

        .nav-bar {
            background: white;
            border-radius: 15px;

        .logo {
            font-size: 24px;

        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            text-decoration: none;
            color: #666;
            font-weight: 500;

            border-radius: 8px;

        .nav-link:hover, .nav-link.active {

        .hero {
            background: white;

        .hero p {

        .albums-grid {
            display: grid;

            margin-bottom: 40px;

        .track-card, .album-card {

        .track-cover, .album-cover {

        .track-info, .album-info {

        .track-title, .album-title {

        }
        
        .track-artist, .album-artist {

            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .track-stats, .album-stats {
            font-size: 14px;

        }
        
        .track-page {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;

            background: #f0f0f0;
            border: none;

            margin-bottom: 20px;
            transition: background 0.3s;
            font-size: 14px;
        }
        
        .back-button:hover {

        }
        
        .track-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;

        }
        
        .track-cover-large {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        
        .track-info-large {
            flex: 1;
        }
        
        .track-title-large {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .track-artist-large {
            font-size: 20px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .audio-player {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }
        
        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .ratings-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .rating-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .avg-score-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        
        .rating-form {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .slider-container {
            margin-bottom: 20px;
        }
        
        .slider-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;

            border-radius: 50%;

        }
        
        .submit-rating-btn {
            width: 100%;

            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;

        }
        
        .chart-container {
            background: white;

            padding: 20px;
            margin-bottom: 30px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .chart-filters {
            display: flex;
            gap: 10px;

        .filter-btn {
            padding: 8px 16px;

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;

        }
        
        .chart-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chart-item:hover {
            background: #e8e9ff;
            transform: translateX(5px);
        }
        
        .chart-position {
            width: 50px;
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            color: #667eea;
        }
        
        .chart-info {
            flex: 1;
        }
        
        .chart-title {
            font-weight: bold;
            font-size: 16px;
        }
        
        .chart-artist {
            font-size: 14px;
            color: #666;
        }
        
        .chart-score {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }
        
        .hidden {
            display: none;
        }
        
        .migration-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;

        }
        
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                text-align: center;
            }
            .track-header {

                align-items: center;

    </style>
</head>
<body>
    <div class="app-container">
        <div class="nav-bar">
            <div class="logo">🎵 Дуля за творчество</div>
            <div class="nav-links">
                <a class="nav-link active" data-page="home">Главная</a>
                <a class="nav-link" data-page="chart">Чарт</a>
                <a class="nav-link" data-page="albums">Альбомы</a>
                <a class="nav-link" data-page="my-ratings">Мои оценки</a>
            </div>
        </div>
        
        <div id="home-page">
            <div class="hero">
                <h1>🎵 Музыкальное сообщество</h1>
                <p>Оценивайте треки, создавайте альбомы и делитесь впечатлениями</p>
                <button id="migrate-btn" class="migration-btn" style="margin-top: 15px;">🔄 Восстановить старые треки</button>
            </div>
            
            <h2 style="color: white; margin-bottom: 20px;">⭐ Топ-5 недели</h2>
            <div id="top-week" class="albums-grid"></div>
            
            <h2 style="color: white; margin: 40px 0 20px;">💿 Новые альбомы</h2>
            <div id="latest-albums" class="albums-grid"></div>
        </div>
        
        <div id="chart-page" class="hidden">
            <div class="chart-container">
                <div class="chart-header">
                    <h2>🏆 Музыкальный чарт</h2>
                    <div class="chart-filters">
                        <button class="filter-btn active" data-filter="all">Все треки</button>
                        <button class="filter-btn" data-filter="week">Топ недели</button>
                        <button class="filter-btn" data-filter="month">Топ месяца</button>
                    </div>
                </div>
                <div id="chart-list" class="chart-list"></div>
            </div>
        </div>
        
        <div id="albums-page" class="hidden">
            <div class="track-page">
                <button class="back-button" onclick="showPage('home')">← На главную</button>
                <h2>Все альбомы</h2>
                <div id="all-albums" class="albums-grid" style="margin-top: 20px;"></div>
            </div>
        </div>
        
        <div id="track-page" class="hidden">
            <div class="track-page" id="track-content"></div>
        </div>
        
        <div id="my-ratings-page" class="hidden">
            <div class="track-page">
                <button class="back-button" onclick="showPage('home')">← На главную</button>
                <h2>Мои оценки</h2>
                <div id="my-ratings-list" class="albums-grid" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfMUhNeaty-xjfXq8NlmnEcozI0eoI19c",
            authDomain: "dulyazatvorchestvo.firebaseapp.com",
            projectId: "dulyazatvorchestvo",
            storageBucket: "dulyazatvorchestvo.firebasestorage.app",
            messagingSenderId: "711700746757",
            appId: "1:711700746757:web:9e2c55939ef87b5a49026c",
            measurementId: "G-9BMQELN0VY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let currentUser = null;
        let currentTrack = null;
        let previousPage = 'home';
        
        // МИГРАЦИЯ: Перенос старых треков и оценок в новую структуру
        async function migrateOldData() {
            console.log("Начинаем миграцию данных...");
            
            try {
                // 1. Получаем все старые оценки из коллекции ratings
                const ratingsSnapshot = await db.collection('ratings').get();
                const oldRatings = [];
                ratingsSnapshot.forEach(doc => oldRatings.push({ id: doc.id, ...doc.data() }));
                
                if (oldRatings.length === 0) {
                    console.log("Нет старых оценок для миграции");
                    alert("Старых оценок не найдено");
                    return;
                }
                
                console.log(`Найдено ${oldRatings.length} старых оценок`);
                
                // 2. Группируем оценки по трекам
                const tracksMap = new Map();
                for (const rating of oldRatings) {
                    const trackKey = `${rating.trackArtist}_${rating.trackTitle}`;
                    if (!tracksMap.has(trackKey)) {
                        tracksMap.set(trackKey, {
                            id: rating.trackId,
                            title: rating.trackTitle,
                            artist: rating.trackArtist,
                            ratings: []
                        });
                    }
                    tracksMap.get(trackKey).ratings.push(rating);
                }
                
                // 3. Создаем альбом "Разное" для всех старых треков
                const miscAlbumRef = db.collection('albums').doc('misc_album');
                const miscAlbumDoc = await miscAlbumRef.get();
                
                let existingTracks = [];
                if (miscAlbumDoc.exists) {
                    existingTracks = miscAlbumDoc.data().tracks || [];
                }
                
                // 4. Добавляем треки в альбом "Разное"
                const newTracks = [];
                for (const [key, track] of tracksMap) {
                    // Проверяем, не добавлен ли уже трек
                    const trackExists = existingTracks.some(t => t.id === track.id);
                    if (!trackExists) {
                        newTracks.push({
                            id: track.id,
                            title: track.title,
                            duration: "3:30",
                            audioUrl: ""
                        });
                    }
                }
                
                const updatedTracks = [...existingTracks, ...newTracks];
                
                await miscAlbumRef.set({
                    id: "misc_album",
                    title: "🎵 Разные треки",
                    artist: "Сообщество",
                    cover: "🎵",
                    year: 2024,
                    tracks: updatedTracks,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isMigrated: true
                });
                
                console.log(`Добавлено ${newTracks.length} треков в альбом "Разные треки"`);
                
                // 5. Обновляем оценки, чтобы они ссылались на правильный альбом
                let updatedCount = 0;
                for (const rating of oldRatings) {
                    // Проверяем, есть ли уже такая оценка в новой структуре
                    const existingRating = await db.collection('ratings')
                        .where('trackId', '==', rating.trackId)
                        .where('userId', '==', rating.userId)
                        .get();
                    
                    if (existingRating.empty) {
                        // Сохраняем оценку с обновленными данными
                        await db.collection('ratings').add({
                            trackId: rating.trackId,
                            trackTitle: rating.trackTitle,
                            trackArtist: rating.trackArtist,
                            userId: rating.userId,
                            scores: rating.scores,
                            totalScore: rating.totalScore,
                            timestamp: rating.timestamp || firebase.firestore.FieldValue.serverTimestamp()
                        });
                        updatedCount++;
                    }
                }
                
                console.log(`Обновлено ${updatedCount} оценок`);
                alert(`✅ Миграция завершена!\n\nДобавлено ${newTracks.length} треков\nОбновлено ${updatedCount} оценок\n\nТеперь ваши старые треки в альбоме "Разные треки"`);
                
                // Обновляем отображение
                displayTopTracks();
                displayChart('all');
                loadMyRatings();
                loadAlbums().then(albums => {
                    displayAlbums(albums.slice(0, 3), 'latest-albums');
                    displayAlbums(albums, 'all-albums');
                });
                
            } catch (error) {
                console.error("Ошибка миграции:", error);
                alert("Ошибка при восстановлении данных: " + error.message);
            }
        }
        
        // Загрузка всех треков с оценками
        async function getAllTracksWithRatings() {
            const albumsSnapshot = await db.collection('albums').get();
            const allTracks = [];
            
            for (const albumDoc of albumsSnapshot.docs) {
                const album = albumDoc.data();
                if (album.tracks) {
                    for (const track of album.tracks) {
                        const ratingsSnapshot = await db.collection('ratings')
                            .where('trackId', '==', track.id)
                            .get();
                        
                        const ratings = [];
                        ratingsSnapshot.forEach(doc => ratings.push(doc.data()));
                        
                        const avgScore = ratings.length > 0 
                            ? ratings.reduce((sum, r) => sum + r.totalScore, 0) / ratings.length
                            : 0;
                        
                        allTracks.push({
                            id: track.id,
                            title: track.title,
                            artist: album.artist,
                            albumTitle: album.title,
                            duration: track.duration,
                            avgScore: avgScore,
                            ratingsCount: ratings.length,
                            ratings: ratings
                        });
                    }
                }
            }
            
            return allTracks;
        }
        
        // Остальные функции (displayChart, loadAlbums, displayAlbums, displayTopTracks, showAlbum, showTrack, submitRating, loadMyRatings, togglePlay, showPage, goBack)
        // ... (сохраняем все функции из предыдущей версии)
        
        async function displayChart(filter = 'all') {
            const allTracks = await getAllTracksWithRatings();
            let filteredTracks = [...allTracks];
            if (filter === 'week') {
                filteredTracks = filteredTracks.filter(t => t.ratingsCount >= 1);
            } else if (filter === 'month') {
                filteredTracks = filteredTracks.filter(t => t.ratingsCount >= 2);
            }
            filteredTracks.sort((a, b) => b.avgScore - a.avgScore);
            
            const chartList = document.getElementById('chart-list');
            chartList.innerHTML = '';
            
            if (filteredTracks.length === 0) {
                chartList.innerHTML = '<p style="text-align: center; padding: 40px;">Пока нет оцененных треков. Будьте первым!</p>';
                return;
            }
            
            filteredTracks.forEach((track, index) => {
                const chartItem = document.createElement('div');
                chartItem.className = 'chart-item';
                chartItem.onclick = () => showTrack(track.id, track.title, track.artist);
                chartItem.innerHTML = `
                    <div class="chart-position">#${index + 1}</div>
                    <div class="chart-info">
                        <div class="chart-title">${track.title}</div>
                        <div class="chart-artist">${track.artist}</div>
                        <div class="chart-rating-count">${track.ratingsCount} оценок</div>
                    </div>
                    <div class="chart-score">${track.avgScore.toFixed(1)}/90</div>
                `;
                chartList.appendChild(chartItem);
            });
        }
        
        async function loadAlbums() {
            const albumsSnapshot = await db.collection('albums').orderBy('createdAt', 'desc').get();
            const albums = [];
            albumsSnapshot.forEach(doc => albums.push({ id: doc.id, ...doc.data() }));
            return albums;
        }
        
        function displayAlbums(albums, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            albums.forEach(album => {
                const albumCard = document.createElement('div');
                albumCard.className = 'album-card';
                albumCard.onclick = () => showAlbum(album.id);
                albumCard.innerHTML = `
                    <div class="album-cover">${album.cover || '💿'}</div>
                    <div class="album-info">
                        <div class="album-title">${album.title}</div>
                        <div class="album-artist">${album.artist}</div>
                        <div class="album-stats">${album.tracks?.length || 0} треков • ${album.year}</div>
                    </div>
                `;
                container.appendChild(albumCard);
            });
        }
        
        async function displayTopTracks() {
            const allTracks = await getAllTracksWithRatings();
            const topTracks = allTracks.sort((a, b) => b.avgScore - a.avgScore).slice(0, 5);
            const container = document.getElementById('top-week');
            container.innerHTML = '';
            
            if (topTracks.length === 0) {
                container.innerHTML = '<p style="color: white;">Пока нет оценок. Оцените первые треки!</p>';
                return;
            }
            
            topTracks.forEach(track => {
                const trackCard = document.createElement('div');
                trackCard.className = 'track-card';
                trackCard.onclick = () => showTrack(track.id, track.title, track.artist);
                trackCard.innerHTML = `
                    <div class="track-cover">🎵</div>
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                        <div class="track-stats">⭐ ${track.avgScore.toFixed(1)}/90 • ${track.ratingsCount} оценок</div>
                    </div>
                `;
                container.appendChild(trackCard);
            });
        }
        
        async function showAlbum(albumId) {
            const albumDoc = await db.collection('albums').doc(albumId).get();
            const album = { id: albumDoc.id, ...albumDoc.data() };
            previousPage = document.querySelector('.nav-link.active').dataset.page;
            
            const trackContent = document.getElementById('track-content');
            trackContent.innerHTML = `
                <button class="back-button" onclick="goBack()">← Назад</button>
                <div class="track-header">
                    <div class="track-cover-large">${album.cover || '💿'}</div>
                    <div class="track-info-large">
                        <div class="track-title-large">${album.title}</div>
                        <div class="track-artist-large">${album.artist}</div>
                        <div>${album.year} • ${album.tracks?.length || 0} треков</div>
                    </div>
                </div>
                <div class="ratings-section">
                    <h3>Треки альбома</h3>
                    ${album.tracks?.map(track => `
                        <div style="padding: 15px; border-bottom: 1px solid #e0e0e0; cursor: pointer;" onclick="showTrack('${track.id}', '${track.title}', '${album.artist}')">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong>${track.title}</strong><br>
                                    <small>${track.duration}</small>
                                </div>
                                <div>▶</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            showPage('track');
        }
        
        async function showTrack(trackId, trackTitle, trackArtist) {
            currentTrack = { id: trackId, title: trackTitle, artist: trackArtist };
            const ratingsSnapshot = await db.collection('ratings').where('trackId', '==', trackId).get();
            
            const ratings = [];
            let userRating = null;
            ratingsSnapshot.forEach(doc => {
                const rating = doc.data();
                ratings.push(rating);
                if (rating.userId === currentUser?.uid) userRating = rating;
            });
            
            const avgScore = ratings.length > 0 ? (ratings.reduce((sum, r) => sum + r.totalScore, 0) / ratings.length).toFixed(1) : 0;
            
            const trackContent = document.getElementById('track-content');
            trackContent.innerHTML = `
                <button class="back-button" onclick="goBack()">← Назад</button>
                <div class="track-header">
                    <div class="track-cover-large">🎵</div>
                    <div class="track-info-large">
                        <div class="track-title-large">${trackTitle}</div>
                        <div class="track-artist-large">${trackArtist}</div>
                        <div class="rating-stats">
                            <div class="avg-score">
                                <div class="avg-score-number">${avgScore}</div>
                                <div>средняя оценка</div>
                                <small>${ratings.length} оценок</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="audio-player">
                    <h3>🎧 Аудиоплеер</h3>
                    <div class="player-controls">
                        <button class="play-btn" onclick="togglePlay(this)">▶</button>
                        <div class="time-info" id="time-info">00:00 / 00:00</div>
                    </div>
                    <audio id="audio-player" style="display: none;"></audio>
                </div>
                <div class="rating-form">
                    <h3>Оценить трек</h3>
                    <div class="slider-container"><label>Рифмы/образы (0-10):</label><input type="range" id="melody" min="0" max="10" value="${userRating?.scores?.melody || 5}"><span id="melody-value">${userRating?.scores?.melody || 5}</span></div>
                    <div class="slider-container"><label>Структура/ритмика (0-10):</label><input type="range" id="rhythm" min="0" max="10" value="${userRating?.scores?.rhythm || 5}"><span id="rhythm-value">${userRating?.scores?.rhythm || 5}</span></div>
                    <div class="slider-container"><label>Реализация стиля (0-10):</label><input type="range" id="lyrics" min="0" max="10" value="${userRating?.scores?.lyrics || 5}"><span id="lyrics-value">${userRating?.scores?.lyrics || 5}</span></div>
                    <div class="slider-container"><label>Индивидуальность (0-10):</label><input type="range" id="originality" min="0" max="10" value="${userRating?.scores?.originality || 5}"><span id="originality-value">${userRating?.scores?.originality || 5}</span></div>
                    <div class="slider-container"><label>Атмосфера (множитель ×1-2):</label><input type="range" id="emotion" min="1" max="2" step="0.1" value="${userRating?.scores?.emotionMultiplier || 1}"><span id="emotion-value">${userRating?.scores?.emotionMultiplier || 1}</span></div>
                    <button class="submit-rating-btn" onclick="submitRating()">${userRating ? 'Обновить оценку' : 'Опубликовать оценку'}</button>
                </div>
                <div class="ratings-section">
                    <h3>Отзывы сообщества</h3>
                    ${ratings.map(rating => `
                        <div style="padding: 15px; border-bottom: 1px solid #e0e0e0;">
                            <strong>⭐ ${rating.totalScore}/90</strong>
                            <div style="font-size: 14px; color: #666; margin-top: 5px;">
                                Рифмы: ${rating.scores.melody} | Ритм: ${rating.scores.rhythm} | 
                                Стиль: ${rating.scores.lyrics} | Харизма: ${rating.scores.originality}
                            </div>
                            <small>${rating.timestamp?.toDate ? new Date(rating.timestamp.toDate()).toLocaleDateString() : 'недавно'}</small>
                        </div>
                    `).join('')}
                    ${ratings.length === 0 ? '<p style="padding: 20px; text-align: center;">Пока нет оценок. Будьте первым!</p>' : ''}
                </div>
            `;
            
            document.querySelectorAll('#track-content input[type="range"]').forEach(slider => {
                const valueSpan = document.getElementById(`${slider.id}-value`);
                if (valueSpan) slider.addEventListener('input', () => valueSpan.textContent = slider.id === 'emotion' ? `×${parseFloat(slider.value).toFixed(1)}` : slider.value);
            });
            showPage('track');
        }
        
        async function submitRating() {
            if (!currentUser) { alert('Подождите, идет авторизация...'); return; }
            const melody = parseInt(document.getElementById('melody').value);
            const rhythm = parseInt(document.getElementById('rhythm').value);
            const lyrics = parseInt(document.getElementById('lyrics').value);
            const originality = parseInt(document.getElementById('originality').value);
            const emotionMultiplier = parseFloat(document.getElementById('emotion').value);
            const sum = melody + rhythm + lyrics + originality;
            const totalScore = Math.min(Math.round(sum * emotionMultiplier * 2.25), 90);
            
            try {
                const existingSnapshot = await db.collection('ratings').where('trackId', '==', currentTrack.id).where('userId', '==', currentUser.uid).get();
                if (!existingSnapshot.empty) {
                    existingSnapshot.forEach(doc => db.collection('ratings').doc(doc.id).update({
                        scores: { melody, rhythm, lyrics, originality, emotionMultiplier }, totalScore, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }));
                } else {
                    await db.collection('ratings').add({
                        trackId: currentTrack.id, trackTitle: currentTrack.title, trackArtist: currentTrack.artist,
                        userId: currentUser.uid, scores: { melody, rhythm, lyrics, originality, emotionMultiplier },
                        totalScore: totalScore, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                alert('Оценка сохранена!');
                showTrack(currentTrack.id, currentTrack.title, currentTrack.artist);
                displayTopTracks();
                displayChart(document.querySelector('.filter-btn.active')?.dataset.filter || 'all');
                loadMyRatings();
            } catch (error) { console.error("Ошибка:", error); alert('Ошибка при сохранении оценки'); }
        }
        
        async function loadMyRatings() {
            if (!currentUser) return;
            const ratingsSnapshot = await db.collection('ratings').where('userId', '==', currentUser.uid).orderBy('timestamp', 'desc').get();
            const container = document.getElementById('my-ratings-list');
            container.innerHTML = '';
            if (ratingsSnapshot.empty) { container.innerHTML = '<p style="color: white; text-align: center;">Вы еще не оценили ни одного трека</p>'; return; }
            ratingsSnapshot.forEach(doc => {
                const rating = doc.data();
                const ratingCard = document.createElement('div');
                ratingCard.className = 'track-card';
                ratingCard.onclick = () => showTrack(rating.trackId, rating.trackTitle, rating.trackArtist);
                ratingCard.innerHTML = `<div class="track-cover">⭐</div><div class="track-info"><div class="track-title">${rating.trackTitle}</div><div class="track-artist">${rating.trackArtist}</div><div class="track-stats">Ваша оценка: ${rating.totalScore}/90</div></div>`;
                container.appendChild(ratingCard);
            });
        }
        
        function togglePlay(btn) {
            const audio = document.getElementById('audio-player');
            if (audio.paused) { audio.play(); btn.textContent = '⏸'; } 
            else { audio.pause(); btn.textContent = '▶'; }
        }
        
        function showPage(page) {
            previousPage = document.querySelector('.nav-link.active')?.dataset.page || 'home';
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('chart-page').classList.add('hidden');
            document.getElementById('albums-page').classList.add('hidden');
            document.getElementById('track-page').classList.add('hidden');
            document.getElementById('my-ratings-page').classList.add('hidden');
            document.getElementById(`${page}-page`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            
            if (page === 'home') { displayTopTracks(); loadAlbums().then(albums => displayAlbums(albums.slice(0, 3), 'latest-albums')); }
            else if (page === 'chart') { displayChart(document.querySelector('.filter-btn.active')?.dataset.filter || 'all'); }
            else if (page === 'albums') { loadAlbums().then(albums => displayAlbums(albums, 'all-albums')); }
            else if (page === 'my-ratings') { loadMyRatings(); }
        }
        
        function goBack() { showPage(previousPage); }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                displayChart(e.target.dataset.filter);
            }
        });
        
        document.getElementById('migrate-btn')?.addEventListener('click', migrateOldData);
        
        auth.signInAnonymously().then((userCredential) => {
            currentUser = userCredential.user;
            displayTopTracks();
            loadAlbums().then(albums => displayAlbums(albums.slice(0, 3), 'latest-albums'));
            displayChart('all');
        }).catch((error) => console.error("Ошибка:", error));
        
        window.showPage = showPage;
        window.showAlbum = showAlbum;
        window.showTrack = showTrack;
        window.submitRating = submitRating;
        window.togglePlay = togglePlay;
        window.goBack = goBack;
    </script>
</body>
</html>
